<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resin Art Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
    <div class="container nav">
        <h2 class="logo">Resin Studio</h2>
        <a href="#order" class="btn">Order</a>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>Minimal & Elegant Resin Art</h1>
        <p>Handcrafted pieces designed to match your style</p>
        <a href="#order" class="btn big">Order via WhatsApp</a>
    </div>
</section>

<section class="gallery">
    <div class="container">
        <h2>Gallery</h2>
        <div class="grid">
            <img src="https://i.imgur.com/umLJ8pO.jpeg">
            <img src="https://i.imgur.com/pQcyye9.jpeg">
            <img src="https://i.imgur.com/lZRVpTP.jpeg">
            <img src="https://i.imgur.com/Ccd54YY.jpeg">
        </div>
    </div>
</section>

<section class="pricing">
    <div class="container">
        <h2>Pricing</h2>
        <div class="cards">
            <div class="card">
                <h3>Small</h3>
                <p>₹300 – ₹800</p>
            </div>
            <div class="card">
                <h3>Medium</h3>
                <p>₹800 – ₹2000</p>
            </div>
            <div class="card">
                <h3>Custom</h3>
                <p>₹2000+</p>
            </div>
        </div>
    </div>
</section>

<section id="order" class="order">
    <div class="container">
        <h2>Place Order</h2>

        <form id="form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="text" id="idea" placeholder="Your Idea" required>
            <input type="text" id="budget" placeholder="Budget ₹" required>

            <button type="submit" class="btn big">Send on WhatsApp</button>
        </form>
    </div>
</section>

<footer>
    <p>Contact on WhatsApp for quick response</p>
</footer>

<script src="script.js"></script>

</body>
</html>
